name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/TMHSDigital/Steam-Cursor-Plugin/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: New Skills
    labels:
      - skill
  - title: New Rules
    labels:
      - rule
  - title: Enhancements
    labels:
      - enhancement
  - title: Bug Fixes
    labels:
      - bug
  - title: Documentation
    labels:
      - documentation
  - title: Maintenance
    labels:
      - maintenance
      - dependencies

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
no-changes-template: 'No changes since last release.'

version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
      - skill
      - rule
  patch:
    labels:
      - patch
      - bug
      - documentation
      - maintenance
  default: patch
