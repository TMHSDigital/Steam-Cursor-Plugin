name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "rules/**"
      - "mcp-tools.json"
      - "site.json"
      - ".cursor-plugin/plugin.json"
      - "assets/**"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: TMHSDigital/Developer-Tools-Directory
          path: _template
          sparse-checkout: site-template

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _template/site-template/requirements.txt

      - name: Build site
        run: python _template/site-template/build_site.py --repo-root . --out docs

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
